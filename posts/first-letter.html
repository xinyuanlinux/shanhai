<body><main class="wrap"><nav><a class="brand" href="../">山海</a><a class="back" href="../journal.html">← 文章目录</a></nav><article><p class="tag">NOTE / 01</p><h1>写给山海的<br>第一封信</h1><p class="date">2026 · 07 · 18</p><p>这个小小的页面，是一处留给自己的安静角落。它不急着说明“我是谁”，而是想先收下每一个真实发生的瞬间。</p><p>也许是深夜完成的一段代码，也许是路上看见的一片云，或是一首恰好击中自己的歌。它们很轻，却会在时间里慢慢成为我们的一部分。</p><blockquote>愿每一次开始都不必完美，但都足够真诚。</blockquote><p>向前走的时候，记得偶尔停下来看看。山海很远，也很近；答案未必马上出现，但脚下的路会一点一点亮起来。</p><p>这是第一篇，也不会是最后一篇。以后在这里，继续记录，继续生长。</p></article><footer>© 2026 山海 · <a href="../">回到主页</a></footer></main></body></html>
