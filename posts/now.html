<body><main class="wrap"><nav><a class="brand" href="../">山海</a><a class="back" href="../#writing">← 返回文章</a></nav><article><p class="tag">NOW / 02</p><h1>把生活调成<br>喜欢的频道</h1><p class="date">2026 · 07 · 18</p><p>“正在做什么”不一定要是一份完美的清单。有时，它只是提醒自己：日子也可以按自己的节奏来。</p><ul><li>把想学的新东西拆成一个可以开始的小步骤；</li><li>为喜欢的音乐留出完整的一首歌时间；</li><li>在忙碌里，依然保留一点好奇和柔软。</li></ul><p>这不是效率竞赛。我们可以慢一点，但不要停止靠近真正喜欢的生活。</p></article><footer>© 2026 山海</footer></main></body></html>
