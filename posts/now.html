</head><body><a class="skip-link" href="#article">跳到正文</a><div class="progress" data-progress></div><header class="wrap site-header"><a class="brand" href="../">山海</a><nav class="site-nav" aria-label="文章导航"><a href="../">主页</a><a href="../journal.html">文章目录</a><a href="https://github.com/xinyuanlinux" target="_blank" rel="noreferrer">GitHub ↗</a></nav></header><main class="article" id="article" tabindex="-1"><header class="article-header"><p class="eyebrow">此刻 · 2026.07.18</p><h1>把生活调成喜欢的频道</h1><p class="article-dek">不必完美的“正在做什么”，也能成为靠近喜欢生活的一步。</p><p class="article-meta"><span>2 分钟阅读</span><span>·</span><span>山海手记</span></p></header><article class="article-body"><p>“正在做什么”不一定要是一份完美的清单。有时，它只是提醒自己：日子也可以按自己的节奏来。</p><p>把想学的新东西拆成一个可以开始的小步骤；为喜欢的音乐留出完整的一首歌时间；在忙碌里，依然保留一点好奇和柔软。</p><blockquote>这不是效率竞赛。我们可以慢一点，但不要停止靠近真正喜欢的生活。</blockquote><p>今天没有完成宏大的目标也没关系。认真吃一顿饭、走一段路、写下一点想法，都是在给生活调回自己喜欢的频道。</p></article><nav class="article-nav" data-article-nav="now" aria-label="文章翻页"></nav></main><footer class="wrap site-footer"><span>© 2026 山海</span><a href="../journal.html">返回文章目录</a></footer></body></html>
